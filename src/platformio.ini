; ExpressLRS PlatformIO Project Configuration File

[platformio]
extra_configs =
	# keep common first
	targets/common.ini
	targets/esp32-tx.ini
	targets/esp32s3-tx.ini
	targets/esp32c3-tx.ini
	targets/esp8285-tx.ini
	targets/esp32-rx.ini
	targets/esp32s3-rx.ini
	targets/esp32c3-rx.ini
	targets/esp8285-rx.ini
	# ConnexInsights custom hardware
	targets/nomad_dual_lr1121_tx.ini
	targets/dbr4_dual_lr1121_rx.ini

# ------------------------- TARGET ENV DEFINITIONS -----------------

[env:native]
platform = native
framework =
test_ignore = test_embedded
lib_ignore = BUTTON, DAC, LQCALC, LBT, SPIEx, PWM, WIFI, TCPSOCKET, LR1121Driver, SX127xDriver
build_src_filter = ${common_env_data.build_src_filter} -<ESP32*.*> -<ESP8*.*> -<tx_*.cpp> -<rx_*.cpp> -<common.*> -<config.*>
build_flags =
	-std=c++11
	-Iinclude
	-D PROGMEM=""
	-D UNIT_TEST=1
	-D TARGET_NATIVE

# ─── ConnexInsights native unit tests ────────────────────────────────────────
# Run: pio test -e native_cx -f test_rfprofile
#       pio test -e native_cx -f test_mbb
#
# Zone tables and exclusion ranges come from test/generated/rf_zone_table.h
# (placed there by -Itest so RFProfile.cpp's __has_include() finds it).
# FEATURE_RF_PROFILE_AUDIT_LOG=0 keeps AuditLog.cpp in stub mode, which
# prevents pulling MBBStateMachine into the test_rfprofile link step.
[env:native_cx]
platform = native
framework =
test_ignore = test_embedded
test_filter = test_rfprofile, test_mbb
lib_ignore =
	BUTTON, DAC, LQCALC, LBT, SPIEx, PWM, WIFI, TCPSOCKET,
	LR1121Driver, SX127xDriver, SX1280Driver,
	ConnexInsights, RFProfileDevice,
	HWTIMER, SCREEN, Backpack, BLE, Handset, GSENSOR, Baro, THERMAL,
	MAVLink, MSPVTX, RFAMP, VTXSPI, VTX, ServoOutput, SerialUpdate,
	POWER_DETECT, POWERMGNT, LED, elrs_eeprom, OPTIONS,
	tx-crsf, rx-crsf, ADC, AnalogVbat
build_src_filter = ${common_env_data.build_src_filter} -<ESP32*.*> -<ESP8*.*> -<tx_*.cpp> -<rx_*.cpp> -<common.*> -<config.*>
build_flags =
	-std=c++11
	-Iinclude
	-Itest
	-DPROGMEM=""
	-DUNIT_TEST=1
	-DTARGET_NATIVE=1
	-DFEATURE_SUBGHZ_ONLY_LR1121=1
	-DFEATURE_CUSTOM_150_960_PROFILE=1
	-DFEATURE_DUAL_LR1121_MAKE_BEFORE_BREAK=1
	-DFEATURE_REGULATORY_EXCLUSION_MASK=1
	-DFEATURE_RF_PROFILE_AUDIT_LOG=0
	-DRF_GUARD_BAND_MHZ=4
