; ============================================================
; Nomad Dual LR1121 TX — PlatformIO target configuration
; Sub-GHz only: 151-959 MHz  |  No 2.4 GHz
; Authorized RF sandbox: NBTC / Army / Air Force
; ============================================================
[env:Nomad_Dual_LR1121_TX]
extends = env_common_esp32tx, radio_LR1121
build_flags =
    ${env_common_esp32tx.build_flags}
    ${radio_LR1121.build_flags}
    -DTARGET_NOMAD_DUAL_LR1121_TX=1
    -DRADIO_LR1121_DUAL=1
    -DFEATURE_SUBGHZ_ONLY_LR1121=1
    -DFEATURE_CUSTOM_150_960_PROFILE=1
    -DFEATURE_DUAL_LR1121_MAKE_BEFORE_BREAK=1
    -DFEATURE_REGULATORY_EXCLUSION_MASK=1
    -DFEATURE_RF_PROFILE_AUDIT_LOG=1
    -DRegulatory_Domain_Custom150_960=1
    -include target/Nomad_DualLR1121_TX.h
    ; compile_profile.py writes generated/rf_zone_table.h into src/ — add src/ so
    ; RFProfile.cpp's __has_include("generated/rf_zone_table.h") finds it.
    -I${PROJECTSRC_DIR}
lib_deps =
    ${env_common_esp32tx.lib_deps}
